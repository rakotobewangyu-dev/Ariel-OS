<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ariel OS - Cloud Sync</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        /* Conserve ton style Cyberpunk actuel */
        :root {
            --cp-yellow: #fcee0a; --cp-cyan: #00e5ff; --cp-red: #ff0055;
            --cp-dark: #0a0a0c; --cp-gray: #1a1a1c; --cp-light-gray: #333;
            --cp-text: #e0e0e0; --cp-green: #00ff66; --cp-purple: #b000ff;
            --cp-orange: #ff8c00; --glass-bg: rgba(20, 20, 25, 0.65);
            --glass-border: rgba(0, 229, 255, 0.15);
            --font-title: 'Orbitron', sans-serif; --font-ui: 'Rajdhani', sans-serif; --font-mono: 'Share Tech Mono', monospace;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: linear-gradient(180deg, #4a0008 0%, #050505 60%, #000000 100%); color: var(--cp-text); font-family: var(--font-ui); height: 100vh; overflow: hidden; display: flex; flex-direction: column; position: relative; }
        .scanlines { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); background-size: 100% 4px, 3px 100%; pointer-events: none; z-index: 999; opacity: 0.3; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 30px; background: rgba(10, 10, 12, 0.7); border-bottom: 2px solid var(--cp-cyan); z-index: 10; flex-shrink: 0; }
        nav { display: flex; gap: 10px; padding: 20px 30px; background-color: rgba(10, 10, 12, 0.6); overflow-x: auto; flex-shrink: 0; }
        .nav-btn { background-color: rgba(0, 229, 255, 0.05); color: var(--cp-cyan); border: 1px solid var(--cp-cyan); padding: 10px 20px; font-family: var(--font-title); cursor: pointer; text-transform: uppercase; }
        .nav-btn.active { background-color: var(--cp-cyan); color: var(--cp-dark); }
        main { padding: 20px 30px; flex: 1; overflow-y: auto; position: relative; }
        .panel { display: none; flex-direction: column; gap: 20px; }
        .panel.active { display: flex; }
        .section-title { color: var(--cp-yellow); font-family: var(--font-title); border-left: 5px solid var(--cp-red); padding-left: 15px; margin-bottom: 20px; }
        .glass-panel { background: var(--glass-bg); backdrop-filter: blur(12px); border: 1px solid var(--glass-border); padding: 20px; }
        .cp-input, .cp-textarea { background: rgba(0,0,0,0.5); border: 1px solid var(--cp-cyan); color: white; padding: 10px; width: 100%; margin-bottom: 10px; }
        .cp-btn { background: var(--cp-yellow); color: black; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; }
        .dash-stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .dash-card { border-left: 4px solid var(--cp-cyan); padding: 15px; background: rgba(255,255,255,0.05); }
        .cyber-number { font-family: 'JetBrains Mono', monospace; }
        #toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 10000; }
        .toast { background: var(--cp-green); color: black; padding: 10px 20px; margin-top: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="scanlines"></div>
    <header>
        <div id="sys-clock" class="cyber-number">CHARGEMENT...</div>
        <div style="color: var(--cp-yellow); font-family: var(--font-title); font-size: 1.5rem;">ARIEL OS v2.0</div>
    </header>

    <nav>
        <button class="nav-btn active" onclick="switchTab('view-nexus')">NEXUS</button>
        <button class="nav-btn" onclick="switchTab('view-protocols')">PROTOCOLES</button>
        <button class="nav-btn" onclick="switchTab('view-finance')">FINANCE</button>
    </nav>

    <main>
        <div id="view-nexus" class="panel active">
            <h2 class="section-title">CENTRE DE CONTRÔLE CLOUD</h2>
            <div class="dash-stats-grid">
                <div class="dash-card">
                    <div>PROTOCOLES</div>
                    <div id="sum-protocols" class="cyber-number" style="font-size: 2rem;">0</div>
                </div>
                <div class="dash-card" style="border-color: var(--cp-green);">
                    <div>SOLDE ACTUEL</div>
                    <div id="sum-finance" class="cyber-number" style="font-size: 2rem;">0.00 ¥</div>
                </div>
            </div>
        </div>

        <div id="view-protocols" class="panel">
            <h2 class="section-title">STRATÉGIES ARIEL</h2>
            <div class="glass-panel">
                <input type="text" id="p-name" class="cp-input" placeholder="Nom du problème (ex: Import Madagascar)">
                <textarea id="p-desc" class="cp-textarea" placeholder="Détails de la stratégie..."></textarea>
                <button class="cp-btn" onclick="addProtocol()">SAUVEGARDER DANS LE CLOUD</button>
            </div>
            <div id="protocol-list" style="margin-top: 20px;"></div>
        </div>

        <div id="view-finance" class="panel">
            <h2 class="section-title">GESTION ARIDAGO</h2>
            <div class="glass-panel">
                <input type="text" id="f-label" class="cp-input" placeholder="Libellé (ex: Vente machine)">
                <input type="number" id="f-amount" class="cp-input" placeholder="Montant">
                <button class="cp-btn" style="background: var(--cp-cyan);" onclick="addTransaction()">ENREGISTRER LE FLUX</button>
            </div>
            <div id="finance-list" style="margin-top: 20px;"></div>
        </div>
    </main>

    <div id="toast-container"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDSk2LGZ_J4hrpzAslfoLbBt_lqeZMAZHE",
            authDomain: "ariel-os-database.firebaseapp.com",
            projectId: "ariel-os-database",
            storageBucket: "ariel-os-database.firebasestorage.app",
            messagingSenderId: "1022378706132",
            appId: "1:1022378706132:web:bea54e9a6a3971b4812741"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- SYNCHRONISATION EN TEMPS RÉEL ---
        
        // Protocoles
        onSnapshot(query(collection(db, "protocols"), orderBy("timestamp", "desc")), (snapshot) => {
            const list = document.getElementById('protocol-list');
            list.innerHTML = '';
            document.getElementById('sum-protocols').innerText = snapshot.size;
            snapshot.forEach(doc => {
                const p = doc.data();
                list.innerHTML += `<div class="glass-panel" style="margin-bottom:10px; display:flex; justify-content:space-between;">
                    <div><strong>${p.name}</strong><br><small>${p.desc}</small></div>
                    <button onclick="deleteData('protocols', '${doc.id}')" style="background:none; color:var(--cp-red); border:none; cursor:pointer;">X</button>
                </div>`;
            });
        });

        // Finances
        onSnapshot(query(collection(db, "transactions"), orderBy("timestamp", "desc")), (snapshot) => {
            const list = document.getElementById('finance-list');
            let total = 0;
            list.innerHTML = '';
            snapshot.forEach(doc => {
                const t = doc.data();
                total += parseFloat(t.amount);
                list.innerHTML += `<div class="glass-panel" style="margin-bottom:5px; border-left:4px solid var(--cp-green); display:flex; justify-content:space-between;">
                    <span>${t.label}</span>
                    <span class="cyber-number">${t.amount} ¥</span>
                </div>`;
            });
            document.getElementById('sum-finance').innerText = total.toFixed(2) + " ¥";
        });

        // --- ACTIONS ---
        window.addProtocol = async () => {
            const name = document.getElementById('p-name').value;
            const desc = document.getElementById('p-desc').value;
            if(!name) return;
            await addDoc(collection(db, "protocols"), { name, desc, timestamp: Date.now() });
            document.getElementById('p-name').value = ''; document.getElementById('p-desc').value = '';
            showToast("STRATÉGIE SAUVÉE");
        };

        window.addTransaction = async () => {
            const label = document.getElementById('f-label').value;
            const amount = document.getElementById('f-amount').value;
            if(!label || !amount) return;
            await addDoc(collection(db, "transactions"), { label, amount, timestamp: Date.now() });
            document.getElementById('f-label').value = ''; document.getElementById('f-amount').value = '';
            showToast("FLUX SYNCHRONISÉ");
        };

        window.deleteData = async (coll, id) => {
            if(confirm("Supprimer définitivement du Cloud ?")) await deleteDoc(doc(db, coll, id));
        };

        function showToast(msg) {
            const c = document.getElementById('toast-container');
            const t = document.createElement('div'); t.className = 'toast'; t.innerText = msg;
            c.appendChild(t); setTimeout(() => t.remove(), 3000);
        }

        window.switchTab = (id) => {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.target.classList.add('active');
        };

        setInterval(() => {
            const d = new Date();
            document.getElementById('sys-clock').innerText = d.toLocaleTimeString() + " | " + d.toLocaleDateString();
        }, 1000);
    </script>
</body>
</html>
